# ============================================================
# FinDocRAG — Docker Publish Pipeline
# See: docs/technical-design-document.md Section 10.3
# Triggers: push to main
# ============================================================

name: Docker Publish

on:
  push:
    branches: [main]
    paths:
      - "services/**"
      - "docker-compose.yml"
      - ".github/workflows/docker-publish.yml"

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/findoc-rag

jobs:
  build-and-push:
    name: Build & Push (${{ matrix.service }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: ingestion
            context: services/ingestion
            image-suffix: ingestion
          - service: embedding-worker
            context: services/embedding-worker
            image-suffix: embedding-worker
          - service: query-api
            context: services/query-api
            image-suffix: query-api

    steps:
      - uses: actions/checkout@v4

      # ── Set up multi-arch build ──────────────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Authenticate to GHCR ─────────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Extract metadata for tags/labels ─────────────────
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.image-suffix }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,format=short

      # ── Build and push ───────────────────────────────────
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Summary ──────────────────────────────────────────────
  publish-summary:
    name: Publish Summary
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Summary
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "## 🐳 Docker Images Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Image | Tags |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Ingestion | \`${{ env.IMAGE_PREFIX }}/ingestion\` | \`latest\`, \`${SHORT_SHA}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Embedding Worker | \`${{ env.IMAGE_PREFIX }}/embedding-worker\` | \`latest\`, \`${SHORT_SHA}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Query API | \`${{ env.IMAGE_PREFIX }}/query-api\` | \`latest\`, \`${SHORT_SHA}\` |" >> $GITHUB_STEP_SUMMARY