suite: Ingress template
templates:
  - ingress.yaml

tests:
  - it: Ingress is not rendered when disabled (default)
    asserts:
      - hasDocuments:
          count: 0

  - it: Ingress is rendered when enabled
    set:
      ingress.enabled: true
    asserts:
      - hasDocuments:
          count: 1

  - it: Ingress has correct kind and API version
    set:
      ingress.enabled: true
    asserts:
      - isKind:
          of: Ingress
      - isAPIVersion:
          of: networking.k8s.io/v1

  - it: Ingress name includes release name
    set:
      ingress.enabled: true
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-ingress

  - it: Ingress is in configured namespace
    set:
      ingress.enabled: true
    asserts:
      - equal:
          path: metadata.namespace
          value: findoc-rag

  - it: Ingress uses configured ingressClassName
    set:
      ingress.enabled: true
    asserts:
      - equal:
          path: spec.ingressClassName
          value: nginx

  - it: Ingress routes /v1/query to query-api service
    set:
      ingress.enabled: true
    asserts:
      - equal:
          path: spec.rules[0].http.paths[0].path
          value: /v1/query
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.name
          value: RELEASE-NAME-query-api
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.port.number
          value: 8000

  - it: Ingress routes /v1/ingest to ingestion service
    set:
      ingress.enabled: true
    asserts:
      - equal:
          path: spec.rules[0].http.paths[1].path
          value: /v1/ingest
      - equal:
          path: spec.rules[0].http.paths[1].backend.service.name
          value: RELEASE-NAME-ingestion

  - it: Ingress routes /v1/filings to ingestion service
    set:
      ingress.enabled: true
    asserts:
      - equal:
          path: spec.rules[0].http.paths[2].path
          value: /v1/filings
      - equal:
          path: spec.rules[0].http.paths[2].backend.service.name
          value: RELEASE-NAME-ingestion

  - it: Ingress uses configured host
    set:
      ingress.enabled: true
    asserts:
      - equal:
          path: spec.rules[0].host
          value: findoc-rag.local

  - it: Ingress has no TLS section when TLS is disabled (default)
    set:
      ingress.enabled: true
    asserts:
      - isNull:
          path: spec.tls

  - it: Ingress includes TLS section when TLS enabled
    set:
      ingress.enabled: true
      ingress.tls.enabled: true
    asserts:
      - equal:
          path: spec.tls[0].hosts[0]
          value: findoc-rag.local
      - equal:
          path: spec.tls[0].secretName
          value: findoc-rag-tls

  - it: Ingress custom host and class
    set:
      ingress.enabled: true
      ingress.host: api.example.com
      ingress.className: traefik
    asserts:
      - equal:
          path: spec.rules[0].host
          value: api.example.com
      - equal:
          path: spec.ingressClassName
          value: traefik
