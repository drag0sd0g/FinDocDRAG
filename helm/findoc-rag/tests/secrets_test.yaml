suite: Secret templates
templates:
  - secrets.yaml

tests:
  # secrets.yaml produces 2 documents:
  #   documentIndex 0: RELEASE-NAME-postgresql
  #   documentIndex 1: RELEASE-NAME-api-keys

  - it: renders two secrets by default
    asserts:
      - hasDocuments:
          count: 2

  - it: postgresql secret has correct kind and type
    documentIndex: 0
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: type
          value: Opaque

  - it: postgresql secret name includes release name
    documentIndex: 0
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-postgresql

  - it: postgresql secret is in configured namespace
    documentIndex: 0
    asserts:
      - equal:
          path: metadata.namespace
          value: findoc-rag

  - it: postgresql secret contains base64-encoded POSTGRES_DB
    documentIndex: 0
    asserts:
      - isNotEmpty:
          path: data.POSTGRES_DB

  - it: postgresql secret contains base64-encoded POSTGRES_USER
    documentIndex: 0
    asserts:
      - isNotEmpty:
          path: data.POSTGRES_USER

  - it: postgresql secret contains base64-encoded POSTGRES_PASSWORD
    documentIndex: 0
    asserts:
      - isNotEmpty:
          path: data.POSTGRES_PASSWORD

  - it: postgresql secret database value encodes the configured db name
    documentIndex: 0
    asserts:
      # "findocrag" base64-encoded is "ZmluZG9jcmFn"
      - equal:
          path: data.POSTGRES_DB
          value: "ZmluZG9jcmFn"

  - it: api-keys secret has correct kind
    documentIndex: 1
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: type
          value: Opaque

  - it: api-keys secret name includes release name
    documentIndex: 1
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-api-keys

  - it: api-keys secret contains API_KEYS
    documentIndex: 1
    asserts:
      - isNotEmpty:
          path: data.API_KEYS

  - it: api-keys secret does not contain OPENAI_API_KEY when not set
    documentIndex: 1
    set:
      queryApi.openaiApiKey: ""
    asserts:
      - isNull:
          path: data.OPENAI_API_KEY

  - it: api-keys secret contains OPENAI_API_KEY when set
    documentIndex: 1
    set:
      queryApi.openaiApiKey: "sk-test-openai-key"
    asserts:
      - isNotEmpty:
          path: data.OPENAI_API_KEY

  - it: postgresql secret carries instance label
    documentIndex: 0
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: RELEASE-NAME

  - it: api-keys secret carries app name label
    documentIndex: 1
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: findoc-rag
