suite: CronJob drift-detection template
templates:
  - cronjob-drift-detection.yaml

tests:
  - it: CronJob is rendered when enabled (default)
    asserts:
      - hasDocuments:
          count: 1

  - it: CronJob has correct kind and API version
    asserts:
      - isKind:
          of: CronJob
      - isAPIVersion:
          of: batch/v1

  - it: CronJob name includes release name
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-drift-detection

  - it: CronJob is in configured namespace
    asserts:
      - equal:
          path: metadata.namespace
          value: findoc-rag

  - it: CronJob schedule matches default value (weekly Sunday 3AM)
    asserts:
      - equal:
          path: spec.schedule
          value: "0 3 * * 0"

  - it: CronJob concurrencyPolicy is Forbid
    asserts:
      - equal:
          path: spec.concurrencyPolicy
          value: Forbid

  - it: CronJob keeps last 3 successful jobs
    asserts:
      - equal:
          path: spec.successfulJobsHistoryLimit
          value: 3

  - it: CronJob keeps last 3 failed jobs
    asserts:
      - equal:
          path: spec.failedJobsHistoryLimit
          value: 3

  - it: CronJob job backoff limit is 1
    asserts:
      - equal:
          path: spec.jobTemplate.spec.backoffLimit
          value: 1

  - it: CronJob pod restart policy is Never
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.restartPolicy
          value: Never

  - it: CronJob uses embedding-worker image
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].image
          value: ghcr.io/drag0sd0g/findoc-rag/embedding-worker:latest

  - it: CronJob runs drift_detector module
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].command[2]
          value: src.drift_detector

  - it: CronJob mounts app-config configmap
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].envFrom[0].configMapRef.name
          value: RELEASE-NAME-app-config

  - it: CronJob references postgresql secret for POSTGRES_PASSWORD
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].env[2].valueFrom.secretKeyRef.name
          value: RELEASE-NAME-postgresql
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].env[2].valueFrom.secretKeyRef.key
          value: POSTGRES_PASSWORD

  - it: CronJob is not rendered when disabled
    set:
      driftDetection.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: CronJob respects custom schedule
    set:
      driftDetection.schedule: "0 2 * * 1"
    asserts:
      - equal:
          path: spec.schedule
          value: "0 2 * * 1"

  - it: CronJob carries drift-detection component label
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/component"]
          value: drift-detection
