suite: Deployment templates
templates:
  - ingestion-deployment.yaml
  - embedding-worker-deployment.yaml
  - query-api-deployment.yaml

tests:
  # ── ingestion-deployment.yaml ──────────────────────────────────────

  - it: ingestion deployment has correct kind and API version
    template: ingestion-deployment.yaml
    asserts:
      - isKind:
          of: Deployment
      - isAPIVersion:
          of: apps/v1

  - it: ingestion deployment name includes release name
    template: ingestion-deployment.yaml
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-ingestion

  - it: ingestion deployment is in configured namespace
    template: ingestion-deployment.yaml
    asserts:
      - equal:
          path: metadata.namespace
          value: findoc-rag

  - it: ingestion deployment has expected replica count
    template: ingestion-deployment.yaml
    asserts:
      - equal:
          path: spec.replicas
          value: 1

  - it: ingestion deployment uses configured image
    template: ingestion-deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/drag0sd0g/findoc-rag/ingestion:latest

  - it: ingestion deployment exposes correct port
    template: ingestion-deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 8001

  - it: ingestion deployment mounts app-config configmap
    template: ingestion-deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].envFrom[0].configMapRef.name
          value: RELEASE-NAME-app-config

  - it: ingestion deployment references postgresql secret
    template: ingestion-deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[0].valueFrom.secretKeyRef.name
          value: RELEASE-NAME-postgresql
      - equal:
          path: spec.template.spec.containers[0].env[0].valueFrom.secretKeyRef.key
          value: POSTGRES_DB

  - it: ingestion deployment has liveness probe on /health
    template: ingestion-deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /health

  - it: ingestion deployment has readiness probe on /health
    template: ingestion-deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /health

  - it: ingestion deployment resource requests are set
    template: ingestion-deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 250m
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: 512Mi

  - it: ingestion deployment labels include component
    template: ingestion-deployment.yaml
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/component"]
          value: ingestion

  # ── embedding-worker-deployment.yaml ──────────────────────────────

  - it: embedding-worker deployment has correct kind
    template: embedding-worker-deployment.yaml
    asserts:
      - isKind:
          of: Deployment

  - it: embedding-worker deployment name includes release name
    template: embedding-worker-deployment.yaml
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-embedding-worker

  - it: embedding-worker deployment has 2 replicas by default
    template: embedding-worker-deployment.yaml
    asserts:
      - equal:
          path: spec.replicas
          value: 2

  - it: embedding-worker deployment uses correct image
    template: embedding-worker-deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/drag0sd0g/findoc-rag/embedding-worker:latest

  - it: embedding-worker deployment exposes port 8002
    template: embedding-worker-deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 8002

  - it: embedding-worker deployment has readiness delay of 60s
    template: embedding-worker-deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.initialDelaySeconds
          value: 60

  - it: embedding-worker deployment custom replica count via values
    template: embedding-worker-deployment.yaml
    set:
      embeddingWorker.replicas: 4
    asserts:
      - equal:
          path: spec.replicas
          value: 4

  # ── query-api-deployment.yaml ──────────────────────────────────────

  - it: query-api deployment has correct kind
    template: query-api-deployment.yaml
    asserts:
      - isKind:
          of: Deployment

  - it: query-api deployment name includes release name
    template: query-api-deployment.yaml
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-query-api

  - it: query-api deployment has 2 replicas by default
    template: query-api-deployment.yaml
    asserts:
      - equal:
          path: spec.replicas
          value: 2

  - it: query-api deployment uses correct image
    template: query-api-deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/drag0sd0g/findoc-rag/query-api:latest

  - it: query-api deployment exposes port 8000
    template: query-api-deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 8000

  - it: query-api deployment references api-keys secret
    template: query-api-deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[3].valueFrom.secretKeyRef.name
          value: RELEASE-NAME-api-keys
      - equal:
          path: spec.template.spec.containers[0].env[3].valueFrom.secretKeyRef.key
          value: API_KEYS

  - it: query-api deployment does not mount OPENAI_API_KEY env when key is empty
    template: query-api-deployment.yaml
    set:
      queryApi.openaiApiKey: ""
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: OPENAI_API_KEY

  - it: query-api deployment mounts OPENAI_API_KEY env when key is provided
    template: query-api-deployment.yaml
    set:
      queryApi.openaiApiKey: "sk-test-key"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OPENAI_API_KEY
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-api-keys
                key: OPENAI_API_KEY

  - it: query-api deployment has liveness probe on /health
    template: query-api-deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /health

  - it: query-api deployment selector matches pod template labels
    template: query-api-deployment.yaml
    asserts:
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/component"]
          value: query-api
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/component"]
          value: query-api
