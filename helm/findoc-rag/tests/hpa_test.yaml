suite: HorizontalPodAutoscaler template
templates:
  - hpa.yaml

tests:
  - it: HPA is rendered when enabled (default)
    asserts:
      - hasDocuments:
          count: 1

  - it: HPA has correct kind and API version
    asserts:
      - isKind:
          of: HorizontalPodAutoscaler
      - isAPIVersion:
          of: autoscaling/v2

  - it: HPA name includes release name
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-query-api

  - it: HPA is in configured namespace
    asserts:
      - equal:
          path: metadata.namespace
          value: findoc-rag

  - it: HPA targets the query-api deployment
    asserts:
      - equal:
          path: spec.scaleTargetRef.kind
          value: Deployment
      - equal:
          path: spec.scaleTargetRef.name
          value: RELEASE-NAME-query-api

  - it: HPA has correct default min replicas
    asserts:
      - equal:
          path: spec.minReplicas
          value: 2

  - it: HPA has correct default max replicas
    asserts:
      - equal:
          path: spec.maxReplicas
          value: 8

  - it: HPA targets CPU utilization at 70%
    asserts:
      - equal:
          path: spec.metrics[0].resource.name
          value: cpu
      - equal:
          path: spec.metrics[0].resource.target.averageUtilization
          value: 70

  - it: HPA is not rendered when disabled
    set:
      queryApi.hpa.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: HPA respects custom min/max replicas
    set:
      queryApi.hpa.minReplicas: 3
      queryApi.hpa.maxReplicas: 15
    asserts:
      - equal:
          path: spec.minReplicas
          value: 3
      - equal:
          path: spec.maxReplicas
          value: 15

  - it: HPA respects custom CPU utilization target
    set:
      queryApi.hpa.targetCPUUtilization: 60
    asserts:
      - equal:
          path: spec.metrics[0].resource.target.averageUtilization
          value: 60

  - it: HPA carries correct component label
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/component"]
          value: query-api
