apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-ollama
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: findoc-rag
    app.kubernetes.io/component: ollama
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.ollama.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/component: ollama
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: findoc-rag
        app.kubernetes.io/component: ollama
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: ollama
          image: {{ .Values.ollama.image }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 11434
              name: http
          resources:
            requests:
              cpu: {{ .Values.ollama.resources.requests.cpu }}
              memory: {{ .Values.ollama.resources.requests.memory }}
            limits:
              cpu: {{ .Values.ollama.resources.limits.cpu }}
              memory: {{ .Values.ollama.resources.limits.memory }}
          lifecycle:
            postStart:
              exec:
                command:
                  - sh
                  - -c
                  - |
                    until ollama list > /dev/null 2>&1; do sleep 2; done
                    ollama pull {{ .Values.ollama.model }}
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - ollama list | grep -q {{ .Values.ollama.model | quote }}
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 20
          livenessProbe:
            exec:
              command: ["ollama", "list"]
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          volumeMounts:
            - name: ollama-models
              mountPath: /root/.ollama
      volumes:
        - name: ollama-models
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-ollama-models
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-ollama-models
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: findoc-rag
    app.kubernetes.io/component: ollama
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  accessModes: ["ReadWriteOnce"]
  {{- if .Values.ollama.storage.storageClassName }}
  storageClassName: {{ .Values.ollama.storage.storageClassName | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.ollama.storage.size }}