apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-ollama
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: findoc-rag
    app.kubernetes.io/component: ollama
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.ollama.replicas }}
  strategy:
    type: Recreate   # Ollama holds model in memory; rolling update would double RAM usage
  selector:
    matchLabels:
      app.kubernetes.io/component: ollama
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: findoc-rag
        app.kubernetes.io/component: ollama
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      initContainers:
        # Pull the model before the main container accepts traffic
        - name: model-pull
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - |
              echo "Waiting for Ollama to be ready..."
              until curl -sf http://localhost:11434/api/tags > /dev/null 2>&1; do
                sleep 2
              done
              echo "Pulling model {{ .Values.ollama.model }}..."
              curl -sf http://localhost:11434/api/pull -d '{"name": "{{ .Values.ollama.model }}"}' || true
              echo "Model pull complete."
      containers:
        - name: ollama
          image: {{ .Values.ollama.image }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 11434
              name: http
          resources:
            requests:
              cpu: {{ .Values.ollama.resources.requests.cpu }}
              memory: {{ .Values.ollama.resources.requests.memory }}
            limits:
              cpu: {{ .Values.ollama.resources.limits.cpu }}
              memory: {{ .Values.ollama.resources.limits.memory }}
          readinessProbe:
            exec:
              command: ["ollama", "list"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command: ["ollama", "list"]
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          volumeMounts:
            - name: ollama-models
              mountPath: /root/.ollama
      volumes:
        - name: ollama-models
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-ollama-models
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-ollama-models
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: findoc-rag
    app.kubernetes.io/component: ollama
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  accessModes: ["ReadWriteOnce"]
  {{- if .Values.ollama.storage.storageClassName }}
  storageClassName: {{ .Values.ollama.storage.storageClassName | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.ollama.storage.size }}