apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-ingestion
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: findoc-rag
    app.kubernetes.io/component: ingestion
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.ingestion.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: ingestion
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: findoc-rag
        app.kubernetes.io/component: ingestion
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: ingestion
          image: {{ .Values.ingestion.image }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.ingestion.port }}
              name: http
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-app-config
            - secretRef:
                name: {{ .Release.Name }}-postgresql
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-postgresql
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-postgresql
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-postgresql
                  key: POSTGRES_PASSWORD
          resources:
            requests:
              cpu: {{ .Values.ingestion.resources.requests.cpu }}
              memory: {{ .Values.ingestion.resources.requests.memory }}
            limits:
              cpu: {{ .Values.ingestion.resources.limits.cpu }}
              memory: {{ .Values.ingestion.resources.limits.memory }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.ingestion.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.ingestion.port }}
            initialDelaySeconds: 15
            periodSeconds: 20