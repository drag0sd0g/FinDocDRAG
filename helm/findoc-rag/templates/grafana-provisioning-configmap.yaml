{{- if .Values.grafana.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-grafana-provisioning
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: findoc-rag
    app.kubernetes.io/component: grafana
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  prometheus.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        url: http://{{ .Release.Name }}-prometheus:9090
        access: proxy
        isDefault: true
        jsonData:
          timeInterval: {{ .Values.prometheus.scrapeInterval }}
  provider.yaml: |
    apiVersion: 1
    providers:
      - name: findoc-rag
        orgId: 1
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        allowUiUpdates: false
        options:
          path: /etc/grafana/dashboards
          foldersFromFilesStructure: false
{{- end }}
