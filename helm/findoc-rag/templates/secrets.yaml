apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-postgresql
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: findoc-rag
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
data:
  POSTGRES_DB: {{ .Values.postgresql.credentials.database | b64enc | quote }}
  POSTGRES_USER: {{ .Values.postgresql.credentials.username | b64enc | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgresql.credentials.password | b64enc | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-api-keys
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: findoc-rag
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
data:
  API_KEYS: {{ .Values.queryApi.apiKeys | b64enc | quote }}
  {{- if .Values.queryApi.openaiApiKey }}
  OPENAI_API_KEY: {{ .Values.queryApi.openaiApiKey | b64enc | quote }}
  {{- end }}