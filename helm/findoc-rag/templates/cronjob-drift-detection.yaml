{{- if .Values.driftDetection.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-drift-detection
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: findoc-rag
    app.kubernetes.io/component: drift-detection
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  schedule: {{ .Values.driftDetection.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: findoc-rag
            app.kubernetes.io/component: drift-detection
            app.kubernetes.io/instance: {{ .Release.Name }}
        spec:
          restartPolicy: Never
          containers:
            - name: drift-detection
              image: {{ .Values.driftDetection.image }}
              command:
                - python
                - -m
                - src.drift_detector
              resources:
                requests:
                  cpu: {{ .Values.driftDetection.resources.requests.cpu }}
                  memory: {{ .Values.driftDetection.resources.requests.memory }}
                limits:
                  cpu: {{ .Values.driftDetection.resources.limits.cpu }}
                  memory: {{ .Values.driftDetection.resources.limits.memory }}
              envFrom:
                - configMapRef:
                    name: {{ .Release.Name }}-app-config
              env:
                - name: POSTGRES_DB
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Release.Name }}-postgresql
                      key: POSTGRES_DB
                - name: POSTGRES_USER
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Release.Name }}-postgresql
                      key: POSTGRES_USER
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Release.Name }}-postgresql
                      key: POSTGRES_PASSWORD
{{- end }}