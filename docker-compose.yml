# ============================================================
# FinDocRAG — Full Local Stack
# Usage: docker compose up
# See: docs/technical-design-document.md Section 10.2
# ============================================================

services:

  # ── PostgreSQL + pgvector ──────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: findoc-postgres
    environment:
      POSTGRES_DB: findocrag
      POSTGRES_USER: findocrag
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U findocrag -d findocrag"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Database migrations ────────────────────────────────────
  db-migrate:
    image: pgvector/pgvector:pg16
    container_name: findoc-db-migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGDATABASE: findocrag
      PGUSER: findocrag
      PGPASSWORD: changeme
    volumes:
      - ./db/migrations:/migrations:ro
    entrypoint: >
      sh -c '
        echo "Running migrations...";
        for f in /migrations/*.sql; do
          echo "Applying $$f";
          psql -f "$$f";
        done;
        echo "Migrations complete.";
      '
    restart: "no"

  # ── Apache Kafka (KRaft mode — no Zookeeper) ──────────────
  kafka:
    image: apache/kafka:latest
    container_name: findoc-kafka
    environment:
      # KRaft mode (no Zookeeper)
      KAFKA_NODE_ID: "1"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      # Auto-create topics
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: "6"
      KAFKA_DEFAULT_REPLICATION_FACTOR: "1"
      KAFKA_LOG_RETENTION_HOURS: "168"
      # Required for KRaft
      CLUSTER_ID: "findoc-rag-kafka-cluster-01"
    ports:
      - "9092:9092"
    volumes:
      - kafkadata:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Ollama (LLM server) ───────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: findoc-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:11434/api/tags > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 10s

  # Pull the model after Ollama is healthy
  ollama-pull:
    image: curlimages/curl:latest
    container_name: findoc-ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: >
      sh -c '
        echo "Pulling model ${OLLAMA_MODEL:-mistral:7b}...";
        curl -sf http://ollama:11434/api/pull -d "{\"name\": \"${OLLAMA_MODEL:-mistral:7b}\"}" || true;
        echo "Model pull complete.";
      '
    restart: "no"

  # ── Ingestion Service ─────────────────────────────────────
  ingestion:
    build:
      context: ./services/ingestion
      dockerfile: Dockerfile
    container_name: findoc-ingestion
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: findocrag
      POSTGRES_USER: findocrag
      POSTGRES_PASSWORD: changeme
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EDGAR_USER_AGENT: "${EDGAR_USER_AGENT:-FinDocRAG findocrag@example.com}"
      EDGAR_RATE_LIMIT_RPS: "10"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    ports:
      - "8001:8001"
    volumes:
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Embedding Worker ──────────────────────────────────────
  embedding-worker:
    build:
      context: ./services/embedding-worker
      dockerfile: Dockerfile
    container_name: findoc-embedding-worker
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: findocrag
      POSTGRES_USER: findocrag
      POSTGRES_PASSWORD: changeme
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EMBEDDING_MODEL: "sentence-transformers/all-MiniLM-L6-v2"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8002/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s  # model download may take time

  # ── Query API ─────────────────────────────────────────────
  query-api:
    build:
      context: ./services/query-api
      dockerfile: Dockerfile
    container_name: findoc-query-api
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      ollama:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: findocrag
      POSTGRES_USER: findocrag
      POSTGRES_PASSWORD: changeme
      LLM_BACKEND: "${LLM_BACKEND:-ollama}"
      OLLAMA_URL: "http://ollama:11434"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-mistral:7b}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      EMBEDDING_MODEL: "sentence-transformers/all-MiniLM-L6-v2"
      API_KEYS: "${API_KEYS:-dev-key-1,dev-key-2}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s  # model download may take time

volumes:
  pgdata:
  kafkadata:
  ollama_models: